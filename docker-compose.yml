services:
  postgres:
    image: postgres:15-alpine
    container_name: telcomanager_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-stock_intervention}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - app_network
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile.combined
    container_name: telcomanager_app
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-stock_intervention}?schema=public
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      NODE_ENV: production
      # Push Notifications
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      # UNYC Sync Configuration (Requis pour la synchro)
      UNYC_BASE_URL: ${UNYC_BASE_URL:-https://atlas-public-api.web.production.unyc.io}
      UNYC_IAM_URL: ${UNYC_IAM_URL:-https://accounts.unyc.io/realms/production}
      UNYC_CLIENT_ID: ${UNYC_CLIENT_ID:-public-api}
      UNYC_USERNAME: ${UNYC_USERNAME}
      UNYC_PASSWORD: ${UNYC_PASSWORD}
      # Optionnel: Reset DB au démarrage (true/false)
      # SEED_ON_START: "false"
    ports:
      - "8081:3000"
    depends_on:
      - postgres
    networks:
      - app_network
    restart: always

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
